name: Deploy Documentation

on:
  push:
    branches:
      - docs
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/eptr2/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # mike needs full git history to manage gh-pages branch

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mkdocs-material mkdocstrings[python] mkdocs-autorefs mike
          pip install -e ".[dataframe]"

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy stable docs
        if: github.ref == 'refs/heads/docs'
        run: mike deploy --push --update-aliases 1.3.8 latest
